<!doctype html>
<html lang="es">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/qgis2web.css"><link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet-search.css">
        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        /* Estilo para el control de visualización de coordenadas */
        .leaflet-control-latlon-coordinates {
            background: rgba(255, 255, 255, 0.8);
            padding: 5px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
            color: #333;
            text-align: left;
            min-width: 280px; /* Ancho ajustado para acomodar UTM */
            box-shadow: 0 1px 5px rgba(0,0,0,0.65);
            white-space: pre-wrap; /* Permite que el texto se ajuste en varias líneas */
            line-height: 1.4; /* Mejora la legibilidad en varias líneas */
        }

        /* Estilo para el control de búsqueda de coordenadas */
        .leaflet-control-coord-search {
            background: rgba(255, 255, 255, 0.8);
            padding: 8px;
            border-radius: 4px;
            font-family: sans-serif;
            font-size: 13px;
            color: #333;
            box-shadow: 0 1px 5px rgba(0,0,0,0.65);
            line-height: 1.5;
        }
        .leaflet-control-coord-search input {
            width: 140px;
            margin-right: 5px;
            border: 1px solid #ccc;
            padding: 3px;
            border-radius: 3px;
        }
        .leaflet-control-coord-search button {
            padding: 3px 8px;
            border: 1px solid #0078A8;
            background-color: #0078A8;
            color: white;
            border-radius: 3px;
            cursor: pointer;
        }
        .leaflet-control-coord-search button:hover {
            background-color: #005f8a;
        }
        </style>
        <title></title>
    </head>
    <body>
        <div id="map">
        </div>
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet-search.js"></script>
        <script src="data/temp4_2.js"></script>
        <script>
        // ¡IMPORTANTE! Mueve la inicialización del mapa aquí, antes de cualquier uso de la variable 'map'
        var map = L.map('map', {
            zoomControl:true, maxZoom:28, minZoom:1
        }).fitBounds([[-42.65361211415855,-86.67829204370794],[-26.24182117346426,-55.74136867070552]]);


        var highlightLayer;
        // Mantiene un registro de las capas resaltadas por búsqueda de categoría
        var categoryHighlightLayers = L.featureGroup();
        map.addLayer(categoryHighlightLayers); // Añadir al mapa, inicialmente estará vacío

        // MODIFICACIÓN CLAVE: Asignar color por categoría
        function style_temp4_2_0(feature) {
            let fillColor = 'rgba(232,113,141,1.0)'; // Color por defecto si no hay categoría o no coincide

            if (feature.properties && feature.properties['Categorias']) {
                switch (feature.properties['Categorias']) {
                    case 'Educación':
                        fillColor = 'rgba(56,128,199,1.0)'; // Azul
                        break;
                    case 'Salud':
                        fillColor = 'rgba(255,0,0,1.0)'; // Rojo
                        break;
                    case 'Medio Ambiente':
                        fillColor = 'rgba(0,128,0,1.0)'; // Verde
                        break;
                    case 'Comunidad':
                        fillColor = 'rgba(255,165,0,1.0)'; // Naranja
                        break;
                    // **¡AÑADE TUS PROPIAS CATEGORÍAS Y COLORES AQUÍ!**
                    // Asegúrate de que los nombres de las categorías coincidan EXACTAMENTE
                    // con los valores en tu archivo data/temp4_2.js
                    //
                    // Ejemplo:
                    // case 'Investigación':
                    //     fillColor = 'rgba(150,50,200,1.0)'; // Púrpura
                    //     break;
                    // case 'Desarrollo Urbano':
                    //     fillColor = '#800080'; // Otro púrpura (hexadecimal)
                    //     break;
                    default:
                        fillColor = 'rgba(128,0,128,1.0)'; // Púrpura para otras categorías no especificadas
                        break;
                }
            }

            return {
                pane: 'pane_temp4_2',
                radius: 4.0,
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1,
                fill: true,
                fillOpacity: 1,
                fillColor: fillColor, // Usar el color determinado por la categoría
                interactive: true,
            };
        }

        function highlightFeature(e) {
            var layer = e.target;
            // Solo aplicar el resaltado al pasar el mouse si no está ya resaltado por búsqueda de categoría
            if (!categoryHighlightLayers.hasLayer(layer)) {
                if (layer.feature.geometry.type === 'LineString') {
                    layer.setStyle({
                        color: '#ffff00',
                    });
                } else {
                    layer.setStyle({
                        fillColor: '#ffff00',
                        fillOpacity: 1
                    });
                }
            }
        }

        function resetHighlight(e) {
            var layer = e.target;
            // Solo restablecer si no está resaltado por búsqueda de categoría
            if (!categoryHighlightLayers.hasLayer(layer)) {
                    // Restablecer el estilo al original basado en las propiedades de la característica
                    layer_temp4_2.resetStyle(layer);
            }
        }

        // Función personalizada para aplicar resaltado para la búsqueda de categoría
        function highlightCategoryPoints(category) {
            // Borrar cualquier punto de categoría previamente resaltado
            clearCategoryHighlights(); // Usar la función de limpieza existente

            layer_temp4_2.eachLayer(function(layer) {
                if (layer.feature.properties && layer.feature.properties['Categorias'] === category) {
                    layer.setStyle({
                        fillColor: '#ffff00', // Resaltado amarillo
                        fillOpacity: 1
                    });
                    categoryHighlightLayers.addLayer(layer); // Añadir al grupo de capas resaltadas
                }
            });
        }

        // Función para borrar todos los resaltados de categoría
        function clearCategoryHighlights() {
            categoryHighlightLayers.eachLayer(function(layer) {
                layer_temp4_2.resetStyle(layer); // Restablecer al estilo original
            });
            categoryHighlightLayers.clearLayers();
        }


        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        function removeEmptyRowsFromPopupContent(content, feature) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var rows = tempDiv.querySelectorAll('tr');
            for (var i = 0; i < rows.length; i++) {
                var td = rows[i].querySelector('td.visible-with-data');
                var key = td ? td.id : '';
                if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                    rows[i].parentNode.removeChild(rows[i]);
                }
            }
            return tempDiv.innerHTML;
        }
        document.querySelector(".leaflet-popup-pane").addEventListener("load", function(event) {
          var tagName = event.target.tagName,
            popup = map._popup;
          // Also check if flag is already set.
          if (tagName === "IMG" && popup && !popup._updated) {
            popup._updated = true; // Set flag to prevent looping.
            popup.update();
          }
        }, true);
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
        }
        map.createPane('pane_OpenStreetMap_0');
        map.getPane('pane_OpenStreetMap_0').style.zIndex = 400;
        var layer_OpenStreetMap_0 = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            pane: 'pane_OpenStreetMap_0',
            opacity: 1.0,
            attribution: '',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 19
        });
        layer_OpenStreetMap_0;
        map.addLayer(layer_OpenStreetMap_0);
        map.createPane('pane_GoogleSatellite_1');
        map.getPane('pane_GoogleSatellite_1').style.zIndex = 401;
        var layer_GoogleSatellite_1 = L.tileLayer('http://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
            pane: 'pane_GoogleSatellite_1',
            opacity: 1.0,
            attribution: '',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 22
        });
        layer_GoogleSatellite_1;
        map.addLayer(layer_GoogleSatellite_1);
        function pop_temp4_2(feature, layer) {
            layer.on({
                mouseout: function(e) {
                    resetHighlight(e); // Usar la nueva función resetHighlight
                },
                mouseover: highlightFeature,
                click: function(e) { // Añadir un manejador de clic para evitar borrar al hacer clic en una característica
                    e.originalEvent._clickedFeature = true; // Establecer una bandera
                },
            });

            let descripcionTexto = feature.properties['Descrip.'] !== null ? feature.properties['Descrip.'].toLocaleString() : '';

            // Lógica personalizada de reemplazo de texto
            const parteClaveTextoOriginal = 'Operativo Veterinario de mascotas c. Vacunación: A partir de los fondos disponibles de la Sebsecretaría de Desarrollo Regional (SUBDERE) para la vacunación y esterilización de mascotas, Guardaparques del Parque Nacional Radal Siete Tazas.';
            const nuevoTexto = 'Operativo Veterinario de mascotas\n\nc. Vacunación:\n\nA partir de los fondos disponibles de la Sebsecretaría de Desarrollo Regional (SUBDERE) para la vacunación y esterilización de mascotas, Guardaparques del Parque Nacional Radal Siete Tazas gestionan la posibilidad de otorgar a la localidad de Radal, como una zona prioritaria para implementar este programa en la comunda de Molina. Para ello, Guardaparques gestionan con la Dirección de Desarrollo Comunal de Molina (DIDECO) el operativo veterinario en Radal y colaboran en la coordinación den terreno a través de la Junta de vecinos. En total se abordaron más de 30 mascotas, aunque en su gran mayoría fueron perros, teniendo muchos problemas para la vacunación de gatos debido a la dificultad de sus dueños para manipularlos. Fecha: 2019.';

            if (descripcionTexto.includes(parteClaveTextoOriginal)) {
                descripcionTexto = nuevoTexto;
            }

            // Contenido del popup
            var popupContent = '<table>\
                                <tr>\
                                    <th scope="row">Categorías:</th>\
                                    <td data-property="Categorias">' + (feature.properties['Categorias'] !== null ? autolinker.link(feature.properties['Categorias'].toLocaleString()) : '') + '</td>\
                                </tr>\
                                <tr>\
                                    <th scope="row">Descripción:</th>\
                                    <td data-property="Descrip.">' + autolinker.link(descripcionTexto) + '</td>\
                                </tr>\
                                <tr>\
                                    <th scope="row">Academicos:</th>\
                                    <td data-property="Academicos">' + (feature.properties['Academicos'] !== null ? autolinker.link(feature.properties['Academicos'].toLocaleString()) : '') + '</td>\
                                </tr>\
                                </table>';

            layer.bindPopup(popupContent, {maxHeight: 400});

            var popup = layer.getPopup();
            var content = popup.getContent();
            var updatedContent = removeEmptyRowsFromPopupContent(content, feature);
            popup.setContent(updatedContent);
        }

        map.createPane('pane_temp4_2');
        map.getPane('pane_temp4_2').style.zIndex = 402;
        map.getPane('pane_temp4_2').style['mix-blend-mode'] = 'normal';
        var layer_temp4_2 = new L.geoJson(json_temp4_2, {
            attribution: '',
            interactive: true,
            dataVar: 'json_temp4_2',
            layerName: 'layer_temp4_2',
            pane: 'pane_temp4_2',
            onEachFeature: pop_temp4_2,
            pointToLayer: function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };
                // Aquí es donde se aplica el estilo que asigna colores por categoría
                return L.circleMarker(latlng, style_temp4_2_0(feature));
            },
        });
        bounds_group.addLayer(layer_temp4_2);
        map.addLayer(layer_temp4_2);

        var baseMaps = {
            "OpenStreetMap": layer_OpenStreetMap_0,
            "Google Satellite": layer_GoogleSatellite_1
        };
        L.control.layers(baseMaps,{'<img src="legend/temp4_2.png" /> Actividades grupo': layer_temp4_2},{collapsed:false}).addTo(map);

        setBounds();

        // Configuración del control de búsqueda por categoría
        var searchControl = new L.Control.Search({
            layer: layer_temp4_2,
            initial: false,
            hideMarkerOnCollapse: true,
            propertyName: 'Categorias'
        });
        map.addControl(searchControl);

        // Escuchar el evento 'search:locationfound'
        searchControl.on('search:locationfound', function(e) {
            highlightCategoryPoints(e.text); // Resaltar todos los puntos de la categoría buscada
            e.layer.openPopup(); // Abrir el popup para la característica específica encontrada
            // Si quieres evitar que el mapa se acerque a la característica encontrada, descomenta la siguiente línea:
            // e.preventDefault();
        });

        // Escuchar el evento 'search:collapsed' para borrar los resaltados si la barra de búsqueda se colapsa
        searchControl.on('search:collapsed', function() {
            // Solo borrar si no hay un marcador activo (lo que significa una búsqueda por categoría, no una selección de una sola característica)
            if (!searchControl._marker) {
                    clearCategoryHighlights();
            }
        });

        document.getElementsByClassName('search-button')[0].className +=
            ' fa fa-binoculars';

        // --- Función de Conversión Lat/Lon a UTM ---
        /**
         * Función de Conversión Lat/Lon a UTM para Zona 18 Sur (WGS84)
         * Esta función implementa la proyección de coordenadas geográficas (Latitud, Longitud)
         * a coordenadas UTM (Este, Norte) para la Zona 18 Sur (WGS84).
         *
         * @param {number} lat - Latitud en grados decimales.
         * @param {number} lon - Longitud en grados decimales.
         * @returns {object} Un objeto con las propiedades easting, northing, zone, y hemisphere.
         */
        function latLonToUtm18S(lat, lon) {
            // Constantes del elipsoide WGS84
            const a = 6378137.0; // Semieje mayor
            const f = 1 / 298.257223563; // Aplanamiento
            const k0 = 0.9996; // Factor de escala central del meridiano

            // Falso Este y Falso Norte (para Hemisferio Sur)
            const FE = 500000;
            const FN = 10000000;

            // Zona UTM y Meridiano Central para 18S
            const zoneNumber = 18;
            const centralMeridianRad = (-75) * (Math.PI / 180); // 18 * 6 - 183 = -75 grados Longitud para 18S

            // Convertir latitud y longitud a radianes
            const latRad = lat * (Math.PI / 180);
            const lonRad = lon * (Math.PI / 180);

            // Cálculos intermedios
            const e2 = 2 * f - f * f; // Excentricidad al cuadrado
            const n = f / (2 - f); // n = (a - b) / (a + b)
            const n2 = n * n;
            const n3 = n * n2;
            const n4 = n * n3;

            const cosLat = Math.cos(latRad);
            const sinLat = Math.sin(latRad);
            const tanLat = Math.tan(latRad);
            const v = a * k0 / Math.sqrt(1 - e2 * sinLat * sinLat); // Radio de curvatura en la normal principal
            const p = (lonRad - centralMeridianRad); // Diferencia de longitud angular desde el meridiano central

            // Coeficientes para la serie del arco de meridiano
            const A0 = 1 - n + (5/4) * (n2 - n3) + (81/64) * (n4);
            const A1 = (3/2) * (n - n2) + (21/16) * (n3 - n4);
            const A2 = (15/16) * (n2 - n3) + (55/32) * (n4);
            const A3 = (35/48) * (n3 - n4);
            const A4 = (315/512) * (n4);

            const M = a * k0 * (A0 * latRad - A1 * Math.sin(2 * latRad) + A2 * Math.sin(4 * latRad) - A3 * Math.sin(6 * latRad) + A4 * Math.sin(8 * latRad));

            const T = tanLat * tanLat;
            const C = e2 * cosLat * cosLat / (1 - e2); // C = (e')^2 * cos^2(lat)
            const N = v; // Es la misma 'v' de arriba, pero a veces se le llama N

            // Cálculo del Easting (E) y Northing (N)
            const E = FE + N * p * cosLat * (1 + (p * p * cosLat * cosLat / 6) * (1 - T + C + (p * p * cosLat * cosLat / 20) * (5 - 18 * T + T * T + 72 * C - 58 * e2)));
            const N_calc = FN + M + N * sinLat * cosLat * (p * p / 2 + (p * p * p * p / 24) * (5 - T + 9 * C + 4 * C * C) + (p * p * p * p * p * p / 720) * (61 - 58 * T + T * T + 600 * C - 330 * e2));

            return {
                easting: E,
                northing: N_calc,
                zone: zoneNumber,
                hemisphere: 'S' // O 'N'
            };
        }
        // --- FIN: Función de Conversión UTM ---

        // --- START: Visor de Coordenadas Lat/Lon en tiempo real ---

        // 1. Crear un control personalizado de Leaflet para mostrar Lat/Lon y UTM
        L.Control.LatLonCoordinates = L.Control.extend({
            onAdd: function(map) {
                this._div = L.DomUtil.create('div', 'leaflet-control-latlon-coordinates');
                this._div.innerHTML = 'Lat: --.--, Lon: --.--<br>UTM E: --.--, N: --.-- (18S)'; // Visualización inicial
                return this._div;
            },
            onRemove: function(map) {
                // Nada específico que hacer al remover
            },
            updateCoordinates: function(lat, lng) {
                const utm = latLonToUtm18S(lat, lng); // Llamar a la función de conversión UTM corregida

                const latLonText = `Lat: ${lat.toFixed(6)}, Lon: ${lng.toFixed(6)}`;
                const utmText = `UTM E: ${utm.easting.toFixed(2)}, N: ${utm.northing.toFixed(2)} (${utm.zone}${utm.hemisphere})`;
                this._div.innerHTML = `${latLonText}<br>${utmText}`;
            }
        });

        // Función de fábrica para el control de visualización de Lat/Lon
        L.control.latLonCoordinates = function(opts) {
            return new L.Control.LatLonCoordinates(opts);
        }

        // 2. Añadir el control de visualización de Lat/Lon al mapa en la posición inferior izquierda
        const latLonControl = L.control.latLonCoordinates({ position: 'bottomleft' }).addTo(map);

        // 3. Actualizar las coordenadas Lat/Lon en tiempo real a medida que el mouse se mueve sobre el mapa
        map.on('mousemove', function(e) {
            latLonControl.updateCoordinates(e.latlng.lat, e.latlng.lng);
        });

        // --- FIN: Visor de Coordenadas Lat/Lon en tiempo real ---


        // --- START: Buscador de Coordenadas Lat/Lon (con 6 decimales y eliminación de marcador al cerrar popup) ---
        let searchMarker; // Para almacenar el marcador colocado por la búsqueda

        L.Control.CoordSearch = L.Control.extend({
            onAdd: function(map) {
                var container = L.DomUtil.create('div', 'leaflet-control-coord-search');
                L.DomEvent.disableClickPropagation(container); // Evita que los clics se propaguen al mapa

                container.innerHTML = `
                    <div>
                        <input type="text" id="coordInput" placeholder="Latitud, Longitud (ej: -33.456789, -70.665432)">
                    </div>
                    <button id="searchCoordBtn">Buscar</button>
                `;

                var coordInput = container.querySelector('#coordInput');
                var searchBtn = container.querySelector('#searchCoordBtn');

                searchBtn.onclick = function() {
                    var inputString = coordInput.value.trim();
                    var parts = inputString.split(',').map(part => parseFloat(part.trim()));

                    // Validar si se analizaron exactamente dos números
                    if (parts.length !== 2 || isNaN(parts[0]) || isNaN(parts[1])) {
                        alert('Por favor, introduce las coordenadas en el formato "Latitud, Longitud" (ej: -33.456789, -70.665432).');
                        return;
                    }

                    var lat = parts[0];
                    var lon = parts[1];

                    // Validar entradas: verificar que sean números válidos y dentro del rango
                    if (lat < -90 || lat > 90 || lon < -180 || lon > 180) {
                        alert('Por favor, introduce coordenadas válidas (Lat: -90 a 90, Lon: -180 a 180).');
                        return;
                    }

                    var newLatLng = L.latLng(lat, lon);
                    map.setView(newLatLng, 15); // Panear y hacer zoom a la nueva ubicación (puedes ajustar el nivel de zoom)

                    // Eliminar marcador existente si lo hay
                    if (searchMarker) {
                        map.removeLayer(searchMarker);
                    }

                    // Añadir un nuevo marcador en la ubicación buscada
                    searchMarker = L.marker(newLatLng).addTo(map)
                        .bindPopup(`<b>Coordenadas buscadas:</b><br>Lat: ${lat.toFixed(6)}, Lon: ${lon.toFixed(6)}`)
                        .openPopup();

                    // Añadir un listener de evento para el cierre del popup del marcador
                    // Cuando el popup se cierra, eliminar el marcador del mapa
                    searchMarker.on('popupclose', function() {
                        map.removeLayer(searchMarker);
                        searchMarker = null; // Limpiar la referencia
                    });
                };

                return container;
            }
        });

        L.control.coordSearch = function(opts) {
            return new L.Control.CoordSearch(opts);
        }

        // Añadir el control de búsqueda de coordenadas al mapa (ej. arriba a la derecha)
        L.control.coordSearch({ position: 'topright' }).addTo(map);

        // --- FIN: Buscador de Coordenadas Lat/Lon ---

        // NUEVO: Borrar resaltados de categoría al hacer clic en cualquier parte del mapa (fuera de una característica)
        map.on('click', function(e) {
            if (!e.originalEvent._clickedFeature) { // Verificar si la bandera no fue establecida por un clic de característica
                clearCategoryHighlights();
            }
            delete e.originalEvent._clickedFeature; // Limpiar la bandera
        });

        </script>
    </body>
</html>
