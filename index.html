<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/qgis2web.css"><link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet-search.css">
        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        /* Style for the coordinate display control */
        .leaflet-control-coordinates {
            background: rgba(255, 255, 255, 0.8);
            padding: 5px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
            color: #333;
            text-align: left;
            min-width: 250px; /* Adjust as needed */
            box-shadow: 0 1px 5px rgba(0,0,0,0.65); /* Optional: add a subtle shadow */
        }
        .leaflet-control-coordinates div {
            margin-bottom: 2px;
        }
        </style>
        <title></title>
    </head>
    <body>
        <div id="map">
        </div>
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet-search.js"></script>
        <script src="js/utm-latlng.js"></script>
        <script src="data/temp4_2.js"></script>
        <script>
        var highlightLayer;
        function highlightFeature(e) {
            highlightLayer = e.target;

            if (e.target.feature.geometry.type === 'LineString') {
              highlightLayer.setStyle({
                color: '#ffff00',
              });
            } else {
              highlightLayer.setStyle({
                fillColor: '#ffff00',
                fillOpacity: 1
              });
            }
        }
        var map = L.map('map', {
            zoomControl:true, maxZoom:28, minZoom:1
        }).fitBounds([[-42.65361211415855,-86.67829204370794],[-26.24182117346426,-55.74136867070552]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        function removeEmptyRowsFromPopupContent(content, feature) {
           var tempDiv = document.createElement('div');
           tempDiv.innerHTML = content;
           var rows = tempDiv.querySelectorAll('tr');
           for (var i = 0; i < rows.length; i++) {
               var td = rows[i].querySelector('td.visible-with-data');
               var key = td ? td.id : '';
               if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                   rows[i].parentNode.removeChild(rows[i]);
               }
           }
           return tempDiv.innerHTML;
        }
        document.querySelector(".leaflet-popup-pane").addEventListener("load", function(event) {
          var tagName = event.target.tagName,
            popup = map._popup;
          // Also check if flag is already set.
          if (tagName === "IMG" && popup && !popup._updated) {
            popup._updated = true; // Set flag to prevent looping.
            popup.update();
          }
        }, true);
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
        }
        map.createPane('pane_OpenStreetMap_0');
        map.getPane('pane_OpenStreetMap_0').style.zIndex = 400;
        var layer_OpenStreetMap_0 = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            pane: 'pane_OpenStreetMap_0',
            opacity: 1.0,
            attribution: '',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 19
        });
        layer_OpenStreetMap_0;
        map.addLayer(layer_OpenStreetMap_0);
        map.createPane('pane_GoogleSatellite_1');
        map.getPane('pane_GoogleSatellite_1').style.zIndex = 401;
        var layer_GoogleSatellite_1 = L.tileLayer('http://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
            pane: 'pane_GoogleSatellite_1',
            opacity: 1.0,
            attribution: '',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 22
        });
        layer_GoogleSatellite_1;
        map.addLayer(layer_GoogleSatellite_1);
        function pop_temp4_2(feature, layer) {
            layer.on({
                mouseout: function(e) {
                    for (i in e.target._eventParents) {
                        e.target._eventParents[i].resetStyle(e.target);
                    }
                },
                mouseover: highlightFeature,
            });

            let descripcionTexto = feature.properties['Descrip.'] !== null ? feature.properties['Descrip.'].toLocaleString() : '';

            // This is the custom text replacement logic
            const parteClaveTextoOriginal = 'Operativo Veterinario de mascotas c. Vacunación: A partir de los fondos disponibles de la Sebsecretaría de Desarrollo Regional (SUBDERE) para la vacunación y esterilización de mascotas, Guardaparques del Parque Nacional Radal Siete Tazas.';
            const nuevoTexto = 'Operativo Veterinario de mascotas\
\
c. Vacunación:\
\
A partir de los fondos disponibles de la Sebsecretaría de Desarrollo Regional (SUBDERE) para la vacunación y esterilización de mascotas, Guardaparques del Parque Nacional Radal Siete Tazas gestionan la posibilidad de otorgar a la localidad de Radal, como una zona prioritaria para implementar este programa en la comunda de Molina. Para ello, Guardaparques gestionan con la Dirección de Desarrollo Comunal de Molina (DIDECO) el operativo veterinario en Radal y colaboran en la coordinación den terreno a través de la Junta de vecinos. En total se abordaron más de 30 mascotas, aunque en su gran mayoría fueron perros, teniendo muchos problemas para la vacunación de gatos debido a la dificultad de sus dueños para manipularlos. Fecha: 2019.';

            if (descripcionTexto.includes(parteClaveTextoOriginal)) {
                descripcionTexto = nuevoTexto;
            }

            // Popup content (no longer editable)
            var popupContent = '<table>\
                        <tr>\
                            <th scope="row">Categorías:</th>\
                            <td data-property="Categorias">' + (feature.properties['Categorias'] !== null ? autolinker.link(feature.properties['Categorias'].toLocaleString()) : '') + '</td>\
                        </tr>\
                        <tr>\
                            <th scope="row">Descripción:</th>\
                            <td data-property="Descrip.">' + autolinker.link(descripcionTexto) + '</td>\
                        </tr>\
                        <tr>\
                            <th scope="row">Academicos:</th>\
                            <td data-property="Academicos">' + (feature.properties['Academicos'] !== null ? autolinker.link(feature.properties['Academicos'].toLocaleString()) : '') + '</td>\
                        </tr>\
                    </table>';

            layer.bindPopup(popupContent, {maxHeight: 400});

            var popup = layer.getPopup();
            var content = popup.getContent();
            var updatedContent = removeEmptyRowsFromPopupContent(content, feature);
            popup.setContent(updatedContent);
        }

        function style_temp4_2_0() {
            return {
                pane: 'pane_temp4_2',
                radius: 4.0,
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(232,113,141,1.0)',
                interactive: true,
            }
        }
        map.createPane('pane_temp4_2');
        map.getPane('pane_temp4_2').style.zIndex = 402;
        map.getPane('pane_temp4_2').style['mix-blend-mode'] = 'normal';
        var layer_temp4_2 = new L.geoJson(json_temp4_2, {
            attribution: '',
            interactive: true,
            dataVar: 'json_temp4_2',
            layerName: 'layer_temp4_2',
            pane: 'pane_temp4_2',
            onEachFeature: pop_temp4_2,
            pointToLayer: function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };
                return L.circleMarker(latlng, style_temp4_2_0(feature));
            },
        });
        bounds_group.addLayer(layer_temp4_2);
        map.addLayer(layer_temp4_2);
        var baseMaps = {};
        L.control.layers(baseMaps,{'<img src="legend/temp4_2.png" /> temp4': layer_temp4_2,"Google Satellite": layer_GoogleSatellite_1,"OpenStreetMap": layer_OpenStreetMap_0,},{collapsed:false}).addTo(map);
        setBounds();
        map.addControl(new L.Control.Search({
            layer: layer_temp4_2,
            initial: false,
            hideMarkerOnCollapse: true,
            propertyName: 'Categorias'})); // The search uses the property name in your data
        document.getElementsByClassName('search-button')[0].className +=
          ' fa fa-binoculars';

        // --- START: REAL-TIME COORDINATE VIEWER FUNCTIONALITY ---

        // 1. Create a custom Leaflet control to display coordinates
        L.Control.Coordinates = L.Control.extend({
            onAdd: function(map) {
                this._div = L.DomUtil.create('div', 'leaflet-control-coordinates');
                // Initial display text
                this._div.innerHTML = '<div>Lat/Lon:</div><div>UTM:</div>';
                return this._div;
            },

            onRemove: function(map) {
                // Nothing specific to do on removal for this control
            },

            // Method to update the displayed coordinates
            updateCoordinates: function(lat, lng) {
                const latLonText = `Lat: ${lat.toFixed(6)}, Lon: ${lng.toFixed(6)}`;

                // Ensure UTMConverter is available from utm-latlng.js
                // If you encounter 'UTMConverter is not defined', double-check utm-latlng.js path and content
                const utmConv = new UTMConverter();
                const utm = utmConv.latLonToUtm(lat, lng);

                let utmText = '';
                if (utm) {
                    // Format UTM coordinates
                    utmText = `UTM: ${utm.easting.toFixed(2)}E, ${utm.northing.toFixed(2)}N, Z${utm.zone}${utm.hemisphere}`;
                } else {
                    utmText = `UTM: N/A`; // Fallback if conversion fails
                }

                // Update the control's inner HTML
                this._div.innerHTML = `<div>Lat/Lon: ${latLonText}</div><div>${utmText}</div>`;
            }
        });

        // Factory function for easy control creation
        L.control.coordinates = function(opts) {
            return new L.Control.Coordinates(opts);
        }

        // 2. Add the coordinate control to the map at the bottom-left position
        const coordControl = L.control.coordinates({ position: 'bottomleft' }).addTo(map);

        // 3. Update coordinates in real-time as the mouse moves over the map
        map.on('mousemove', function(e) {
            coordControl.updateCoordinates(e.latlng.lat, e.latlng.lng);
        });

        // --- END: REAL-TIME COORDINATE VIEWER FUNCTIONALITY ---
        </script>
    </body>
</html>
