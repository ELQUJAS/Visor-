<!doctype html>
<html lang="es">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/qgis2web.css"><link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet-search.css">
        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        /* Style for the coordinate display control */
        .leaflet-control-latlon-coordinates {
            background: rgba(255, 255, 255, 0.8);
            padding: 5px 8px; /* Slightly more padding */
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
            color: #333;
            text-align: left;
            min-width: 160px; /* Adjust as needed */
            box-shadow: 0 1px 5px rgba(0,0,0,0.65); /* Optional: add a subtle shadow */
            white-space: nowrap; /* Keep text on one line */
        }

        /* Style for the coordinate search control */
        .leaflet-control-coord-search {
            background: rgba(255, 255, 255, 0.8);
            padding: 8px;
            border-radius: 4px;
            font-family: sans-serif;
            font-size: 13px;
            color: #333;
            box-shadow: 0 1px 5px rgba(0,0,0,0.65);
            line-height: 1.5;
        }
        .leaflet-control-coord-search input {
            width: 140px; /* Adjusted width for combined coordinates */
            margin-right: 5px;
            border: 1px solid #ccc;
            padding: 3px;
            border-radius: 3px;
        }
        .leaflet-control-coord-search button {
            padding: 3px 8px;
            border: 1px solid #0078A8;
            background-color: #0078A8;
            color: white;
            border-radius: 3px;
            cursor: pointer;
        }
        .leaflet-control-coord-search button:hover {
            background-color: #005f8a;
        }
        </style>
        <title></title>
    </head>
    <body>
        <div id="map">
        </div>
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet-search.js"></script>
        <script src="data/temp4_2.js"></script>
        <script>
        var highlightLayer;
        // Keep track of layers highlighted by category search
        var categoryHighlightLayers = L.featureGroup();
        map.addLayer(categoryHighlightLayers); // Add to map, but it will be empty initially

        function style_temp4_2_0(feature) { // Ensure this function can take a feature argument
            return {
                pane: 'pane_temp4_2',
                radius: 4.0,
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(232,113,141,1.0)', // Original fill color
                interactive: true,
            };
        }

        function highlightFeature(e) {
            var layer = e.target;
            // Only apply hover highlight if not already highlighted by category search
            if (!categoryHighlightLayers.hasLayer(layer)) {
                if (layer.feature.geometry.type === 'LineString') {
                  layer.setStyle({
                    color: '#ffff00',
                  });
                } else {
                  layer.setStyle({
                    fillColor: '#ffff00',
                    fillOpacity: 1
                  });
                }
            }
        }

        function resetHighlight(e) {
            var layer = e.target;
            // Only reset if not highlighted by category search
            if (!categoryHighlightLayers.hasLayer(layer)) {
                 // Reset the style to the original based on the feature properties
                layer_temp4_2.resetStyle(layer);
            }
        }

        // Custom function to apply highlight for category search
        function highlightCategoryPoints(category) {
            // Clear any previously highlighted category points
            clearCategoryHighlights(); // Use the existing clear function

            layer_temp4_2.eachLayer(function(layer) {
                if (layer.feature.properties && layer.feature.properties['Categorias'] === category) {
                    layer.setStyle({
                        fillColor: '#ffff00', // Yellow highlight
                        fillOpacity: 1
                    });
                    categoryHighlightLayers.addLayer(layer); // Add to the group of highlighted layers
                }
            });
        }

        // Function to clear all category highlights
        function clearCategoryHighlights() {
            categoryHighlightLayers.eachLayer(function(layer) {
                layer_temp4_2.resetStyle(layer); // Reset to original style
            });
            categoryHighlightLayers.clearLayers();
        }

        var map = L.map('map', {
            zoomControl:true, maxZoom:28, minZoom:1
        }).fitBounds([[-42.65361211415855,-86.67829204370794],[-26.24182117346426,-55.74136867070552]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        function removeEmptyRowsFromPopupContent(content, feature) {
           var tempDiv = document.createElement('div');
           tempDiv.innerHTML = content;
           var rows = tempDiv.querySelectorAll('tr');
           for (var i = 0; i < rows.length; i++) {
               var td = rows[i].querySelector('td.visible-with-data');
               var key = td ? td.id : '';
               if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                   rows[i].parentNode.removeChild(rows[i]);
               }
           }
           return tempDiv.innerHTML;
        }
        document.querySelector(".leaflet-popup-pane").addEventListener("load", function(event) {
          var tagName = event.target.tagName,
            popup = map._popup;
          // Also check if flag is already set.
          if (tagName === "IMG" && popup && !popup._updated) {
            popup._updated = true; // Set flag to prevent looping.
            popup.update();
          }
        }, true);
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
        }
        map.createPane('pane_OpenStreetMap_0');
        map.getPane('pane_OpenStreetMap_0').style.zIndex = 400;
        var layer_OpenStreetMap_0 = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            pane: 'pane_OpenStreetMap_0',
            opacity: 1.0,
            attribution: '',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 19
        });
        layer_OpenStreetMap_0;
        map.addLayer(layer_OpenStreetMap_0);
        map.createPane('pane_GoogleSatellite_1');
        map.getPane('pane_GoogleSatellite_1').style.zIndex = 401;
        var layer_GoogleSatellite_1 = L.tileLayer('http://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
            pane: 'pane_GoogleSatellite_1',
            opacity: 1.0,
            attribution: '',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 22
        });
        layer_GoogleSatellite_1;
        map.addLayer(layer_GoogleSatellite_1);
        function pop_temp4_2(feature, layer) {
            layer.on({
                mouseout: function(e) {
                    resetHighlight(e); // Use the new resetHighlight function
                },
                mouseover: highlightFeature,
                click: function(e) { // Add a click handler to prevent clearing on feature click
                    e.originalEvent._clickedFeature = true; // Set a flag
                },
            });

            let descripcionTexto = feature.properties['Descrip.'] !== null ? feature.properties['Descrip.'].toLocaleString() : '';

            // This is the custom text replacement logic
            const parteClaveTextoOriginal = 'Operativo Veterinario de mascotas c. Vacunación: A partir de los fondos disponibles de la Sebsecretaría de Desarrollo Regional (SUBDERE) para la vacunación y esterilización de mascotas, Guardaparques del Parque Nacional Radal Siete Tazas.';
            const nuevoTexto = 'Operativo Veterinario de mascotas\
\n\
c. Vacunación:\
\n\
A partir de los fondos disponibles de la Sebsecretaría de Desarrollo Regional (SUBDERE) para la vacunación y esterilización de mascotas, Guardaparques del Parque Nacional Radal Siete Tazas gestionan la posibilidad de otorgar a la localidad de Radal, como una zona prioritaria para implementar este programa en la comunda de Molina. Para ello, Guardaparques gestionan con la Dirección de Desarrollo Comunal de Molina (DIDECO) el operativo veterinario en Radal y colaboran en la coordinación den terreno a través de la Junta de vecinos. En total se abordaron más de 30 mascotas, aunque en su gran mayoría fueron perros, teniendo muchos problemas para la vacunación de gatos debido a la dificultad de sus dueños para manipularlos. Fecha: 2019.';

            if (descripcionTexto.includes(parteClaveTextoOriginal)) {
                descripcionTexto = nuevoTexto;
            }

            // Popup content (no longer editable)
            var popupContent = '<table>\
                                <tr>\
                                    <th scope="row">Categorías:</th>\
                                    <td data-property="Categorias">' + (feature.properties['Categorias'] !== null ? autolinker.link(feature.properties['Categorias'].toLocaleString()) : '') + '</td>\
                                </tr>\
                                <tr>\
                                    <th scope="row">Descripción:</th>\
                                    <td data-property="Descrip.">' + autolinker.link(descripcionTexto) + '</td>\
                                </tr>\
                                <tr>\
                                    <th scope="row">Academicos:</th>\
                                    <td data-property="Academicos">' + (feature.properties['Academicos'] !== null ? autolinker.link(feature.properties['Academicos'].toLocaleString()) : '') + '</td>\
                                </tr>\
                                </table>';

            layer.bindPopup(popupContent, {maxHeight: 400});

            var popup = layer.getPopup();
            var content = popup.getContent();
            var updatedContent = removeEmptyRowsFromPopupContent(content, feature);
            popup.setContent(updatedContent);
        }

        map.createPane('pane_temp4_2');
        map.getPane('pane_temp4_2').style.zIndex = 402;
        map.getPane('pane_temp4_2').style['mix-blend-mode'] = 'normal';
        var layer_temp4_2 = new L.geoJson(json_temp4_2, {
            attribution: '',
            interactive: true,
            dataVar: 'json_temp4_2',
            layerName: 'layer_temp4_2',
            pane: 'pane_temp4_2',
            onEachFeature: pop_temp4_2,
            pointToLayer: function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };
                return L.circleMarker(latlng, style_temp4_2_0(feature));
            },
        });
        bounds_group.addLayer(layer_temp4_2);
        map.addLayer(layer_temp4_2);

        var baseMaps = {
            "OpenStreetMap": layer_OpenStreetMap_0,
            "Google Satellite": layer_GoogleSatellite_1
        };
        L.control.layers(baseMaps,{'<img src="legend/temp4_2.png" /> Actividades grupo': layer_temp4_2},{collapsed:false}).addTo(map);

        setBounds();

        // MODIFIED: Category search control setup
        var searchControl = new L.Control.Search({
            layer: layer_temp4_2,
            initial: false,
            hideMarkerOnCollapse: true,
            propertyName: 'Categorias'
        });
        map.addControl(searchControl);

        // Listen for the 'search:locationfound' event
        searchControl.on('search:locationfound', function(e) {
            highlightCategoryPoints(e.text); // Highlight all points for the searched category
            e.layer.openPopup(); // Still open popup for the specific found feature
            // If you want to prevent the map from zooming to the single found feature, uncomment the next line:
            // e.preventDefault();
        });

        // Listen for the 'search:collapsed' event to clear highlights if search bar is collapsed
        searchControl.on('search:collapsed', function() {
            // Only clear if no marker is actively showing (meaning a category search, not a single feature select)
            if (!searchControl._marker) {
                 clearCategoryHighlights();
            }
        });

        document.getElementsByClassName('search-button')[0].className +=
          ' fa fa-binoculars';

        // --- START: Real-time Lat/Lon Coordinate Viewer ---

        // 1. Create a custom Leaflet control for Lat/Lon display
        L.Control.LatLonCoordinates = L.Control.extend({
            onAdd: function(map) {
                this._div = L.DomUtil.create('div', 'leaflet-control-latlon-coordinates');
                this._div.innerHTML = 'Lat: --.--, Lon: --.--'; // Initial display
                return this._div;
            },
            onRemove: function(map) {
                // Nothing specific to do on removal
            },
            updateCoordinates: function(lat, lng) {
                const latLonText = `Lat: ${lat.toFixed(6)}, Lon: ${lng.toFixed(6)}`;
                this._div.innerHTML = latLonText;
            }
        });

        // Factory function for Lat/Lon display control
        L.control.latLonCoordinates = function(opts) {
            return new L.Control.LatLonCoordinates(opts);
        }

        // 2. Add the Lat/Lon display control to the map at the bottom-left position
        const latLonControl = L.control.latLonCoordinates({ position: 'bottomleft' }).addTo(map);

        // 3. Update Lat/Lon coordinates in real-time as the mouse moves over the map
        map.on('mousemove', function(e) {
            latLonControl.updateCoordinates(e.latlng.lat, e.latlng.lng);
        });

        // --- END: Real-time Lat/Lon Coordinate Viewer ---


        // --- START: Lat/Lon Coordinate Searcher (with 6 decimals and marker removal on popup close) ---
        let searchMarker; // To store the marker placed by the search

        L.Control.CoordSearch = L.Control.extend({
            onAdd: function(map) {
                var container = L.DomUtil.create('div', 'leaflet-control-coord-search');
                L.DomEvent.disableClickPropagation(container); // Prevent clicks from propagating to the map

                container.innerHTML = `
                    <div>
                        <input type="text" id="coordInput" placeholder="Latitud, Longitud (ej: -33.456789, -70.665432)">
                    </div>
                    <button id="searchCoordBtn">Buscar</button>
                `;

                var coordInput = container.querySelector('#coordInput');
                var searchBtn = container.querySelector('#searchCoordBtn');

                searchBtn.onclick = function() {
                    var inputString = coordInput.value.trim();
                    var parts = inputString.split(',').map(part => parseFloat(part.trim()));

                    // Validate if exactly two numbers were parsed
                    if (parts.length !== 2 || isNaN(parts[0]) || isNaN(parts[1])) {
                        alert('Por favor, introduce las coordenadas en el formato "Latitud, Longitud" (ej: -33.456789, -70.665432).');
                        return;
                    }

                    var lat = parts[0];
                    var lon = parts[1];

                    // Validate inputs: check if they are valid numbers and within range
                    if (lat < -90 || lat > 90 || lon < -180 || lon > 180) {
                        alert('Por favor, introduce coordenadas válidas (Lat: -90 a 90, Lon: -180 a 180).');
                        return;
                    }

                    var newLatLng = L.latLng(lat, lon);
                    map.setView(newLatLng, 15); // Pan and zoom to the new location (you can adjust zoom level)

                    // Remove existing marker if any
                    if (searchMarker) {
                        map.removeLayer(searchMarker);
                    }

                    // Add a new marker at the searched location
                    searchMarker = L.marker(newLatLng).addTo(map)
                        .bindPopup(`<b>Coordenadas buscadas:</b><br>Lat: ${lat.toFixed(6)}, Lon: ${lon.toFixed(6)}`)
                        .openPopup();

                    // Add an event listener to the marker's popup close event
                    // When the popup is closed, remove the marker from the map
                    searchMarker.on('popupclose', function() {
                        map.removeLayer(searchMarker);
                        searchMarker = null; // Clear the reference
                    });
                };

                return container;
            }
        });

        L.control.coordSearch = function(opts) {
            return new L.Control.CoordSearch(opts);
        }

        // Add the coordinate search control to the map (e.g., topright)
        L.control.coordSearch({ position: 'topright' }).addTo(map);

        // --- END: Lat/Lon Coordinate Searcher ---

        // NEW: Clear category highlights when clicking anywhere on the map (outside a feature)
        map.on('click', function(e) {
            if (!e.originalEvent._clickedFeature) { // Check if the flag wasn't set by a feature click
                clearCategoryHighlights();
            }
            delete e.originalEvent._clickedFeature; // Clean up the flag
        });

        </script>
    </body>
</html>
